# Netlify — Frontend menú público (Vite)
# En Netlify: "Base directory" = frontend
[build]
  command = "npm run build"
  publish = "dist"

# URL del backend en Render (Vite la inyecta en build; el código le agrega /api).
# El .env local está en .gitignore, así que Netlify necesita esta variable acá.
[build.environment]
  VITE_API_URL = "https://backend-menu-digital.onrender.com"

# SPA: cualquier ruta cae en index.html (evita 404 al recargar /menu, etc.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Cabeceras de seguridad ───────────────────────────────────
# CSP estricta. connect-src DEBE listar la URL del backend (cross-origin);
# img-src permite https: para las imágenes de productos (Cloudinary u otros).
# Si querés embeber el menú en otra web (iframe), cambiá frame-ancestors.
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://backend-menu-digital.onrender.com https://menu-digital-backend.onrender.com; upgrade-insecure-requests"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
