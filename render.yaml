databases:
  - name: menu-digital-db
    databaseName: menu_digital
    user: menu_user

services:
  # Backend API
  - type: web
    name: menu-digital-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: menu-digital-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

  # Frontend - Menú (público)
  - type: web
    name: menu-digital-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://menu-digital-backend.onrender.com

  # Frontend - Admin (panel de gestión)
  - type: web
    name: menu-digital-admin
    env: static
    buildCommand: cd frontend-admin && npm install && npm run build
    staticPublishPath: frontend-admin/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://menu-digital-backend.onrender.com
      # URL del menú público (botón "Ver Menú" del panel admin).
      - key: VITE_MENU_URL
        value: https://menu-digital-frontend.onrender.com